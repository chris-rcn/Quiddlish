<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiddlish</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app">

  <!-- ── Header ── -->
  <header id="game-header">
    <h1 class="game-title">Quiddlish</h1>
    <div id="round-display" class="round-display">Round — of 8</div>
    <button id="new-game-btn" class="btn btn-primary" disabled>New Game</button>
  </header>

  <!-- ── Score bar ── -->
  <div id="score-bar">
    <div class="score-block">
      <span class="score-label">You</span>
      <span id="player-score" class="score-value">0</span>
    </div>
    <div class="score-block">
      <span class="score-label">Computer</span>
      <span id="computer-score" class="score-value">0</span>
    </div>
  </div>

  <!-- ── Main board ── -->
  <main id="board">

    <!-- Computer's hand -->
    <section id="computer-section" class="hand-section">
      <div id="computer-hand-label" class="hand-label">Computer</div>
      <div id="computer-hand" class="hand computer-hand"></div>
    </section>

    <!-- Deck and Discard -->
    <section id="piles-section">
      <div class="pile-group">
        <div class="pile-label">Deck</div>
        <div id="deck-pile" class="pile"></div>
        <button id="draw-deck-btn" class="btn btn-draw" disabled>Draw</button>
      </div>
      <div class="pile-group">
        <div class="pile-label">Discard</div>
        <div id="discard-pile" class="pile"></div>
        <button id="draw-discard-btn" class="btn btn-draw" disabled>Take</button>
      </div>
    </section>

    <!-- Word zone (shown during player's discard phase) -->
    <section id="word-zone-section" class="hidden">
      <div class="hand-label">Your Words <span class="hint">(drag cards here to form words)</span></div>
      <div id="word-zone"></div>
    </section>

    <!-- Player's hand -->
    <section id="player-section" class="hand-section">
      <div class="hand-label">
        Your Hand
        <span class="hint">— drag to rearrange; click to select for discard</span>
      </div>
      <div id="player-hand" class="hand player-hand"></div>
    </section>

    <!-- Action buttons -->
    <section id="action-bar">
      <button id="go-out-btn" class="btn btn-success" disabled>Go Out!</button>
      <button id="end-turn-btn" class="btn btn-secondary" disabled>End Turn</button>
      <button id="next-round-btn" class="btn btn-primary hidden">Next Round</button>
      <button id="play-again-btn" class="btn btn-primary hidden">Play Again</button>
    </section>

    <!-- Status message -->
    <div id="status-message" class="status-message">Loading…</div>

    <!-- Round / game result panel -->
    <div id="result-panel" class="result-panel hidden"></div>

  </main>

  <footer id="build-footer">Built <time id="build-stamp">2026-03-09 23:00 UTC</time></footer>

</div>

<!-- Scripts: load order matters (dependencies before consumers) -->
<script src="js/cards.js"></script>
<script src="js/dictionary.js"></script>
<script src="js/gameEngine.js"></script>
<script src="js/ai.js"></script>
<script src="js/ui.js"></script>
<script src="js/drag.js"></script>
<script src="js/main.js"></script>

</body>
</html>
